services:
  server:
    build:
      context: ../..
      dockerfile: apps/server/Containerfile
    environment:
      PORT: 4000
      REDIS_URL: redis://redis:6379
      WEB_BASE_URL: https://poker4.fun
    ports:
      - "4000:4000"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:8.6.2
    restart: unless-stopped
    command: redis-server --save 60 1 --appendonly yes --loglevel warning
    volumes:
      - redis:/data

volumes:
  redis:
